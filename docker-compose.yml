services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chronicle
      POSTGRES_PASSWORD: chronicle_dev
      POSTGRES_DB: chronicle
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronicle"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "8080"
      BACKEND_MODE: real
      DATABASE_URL: "postgresql://chronicle:chronicle_dev@postgres:5432/chronicle"
      AUTH_SECRET: "dev-secret-key-change-in-production-at-least-32-chars"
      RUST_LOG: "info,tower_http=debug"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      NEXT_PUBLIC_BACKEND_URL: "http://backend:8080"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
