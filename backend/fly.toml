# fly.toml app configuration file for Chronicle Labs backend
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'chronicle-backend'
primary_region = 'ams'

[build]

[env]
  API_HOST = "0.0.0.0"
  API_PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
