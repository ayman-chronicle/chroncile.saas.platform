# Chronicle world environment.
#
# Publish with:
#   chronicle environments publish environment.toml

slug = "daytona-dev"
label = "Daytona (dev)"
description = "Local development world simulator environment"
version = "v1"
status = "published"

[spec.interception]
regularProxyPort = 8888
transparentProxyPort = 8889
installCa = true

